name: ci

on:
  push:
    branches: [master, main, v2-rebuild]
  pull_request:
    branches: [master, main, v2-rebuild]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-manifests:
    name: Validate Manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');
          const packages = ['packages/sdk', 'frontend', 'coordinator', 'resolver', 'relayer', 'contracts', 'e2e'];
          const rootDir = process.cwd();
          let errors = [];
          packages.forEach(pkgDir => {
            const pkgPath = path.join(rootDir, pkgDir, 'package.json');
            if (!fs.existsSync(pkgPath)) {
              errors.push(\`Missing package.json in \${pkgDir}\`);
              return;
            }
            const pkgJson = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
            if (!pkgJson.name) {
              errors.push(\`\${pkgDir}: Missing \\"name\\" field\`);
            } else if (!pkgJson.name.startsWith('@wafflefinance/')) {
              errors.push(\`\${pkgDir}: Name \\"\${pkgJson.name}\\" does not start with \\"@wafflefinance/\\"\`);
            }
            if (!pkgJson.version) {
              errors.push(\`\${pkgDir}: Missing \\"version\\" field\`);
            } else if (!/^\\d+\\.\\d+\\.\\d+$/.test(pkgJson.version)) {
              errors.push(\`\${pkgDir}: Version \\"\${pkgJson.version}\\" is not valid semver\`);
            }
            const depGroups = ['dependencies', 'devDependencies', 'peerDependencies'];
            depGroups.forEach(group => {
              if (pkgJson[group]) {
                Object.keys(pkgJson[group]).forEach(depName => {
                  if (depName.startsWith('@wafflefinance/')) {
                    const depVer = pkgJson[group][depName];
                    if (depVer !== 'workspace:*') {
                      errors.push(\`\${pkgDir}: Dependency \\"\${depName}\\" in \\"\${group}\\" is \\"\${depVer}\\" instead of \\"workspace:*\\"\`);
                    }
                  }
                });
              }
            });
            if (pkgDir === 'packages/sdk') {
              if (!pkgJson.main) {
                errors.push(\`\${pkgDir}: Missing \\"main\\" field\`);
              } else {
                const mainPath = path.join(rootDir, pkgDir, pkgJson.main);
                if (!fs.existsSync(mainPath)) {
                  errors.push(\`\${pkgDir}: Main file \\"\${pkgJson.main}\\" resolved to \\"\${mainPath}\\" but it does not exist\`);
                }
              }
              if (!pkgJson.types) {
                errors.push(\`\${pkgDir}: Missing \\"types\\" field\`);
              } else {
                const typesPath = path.join(rootDir, pkgDir, pkgJson.types);
                if (!fs.existsSync(typesPath)) {
                  errors.push(\`\${pkgDir}: Types file \\"\${pkgJson.types}\\" resolved to \\"\${typesPath}\\" but it does not exist\`);
                }
              }
              if (!pkgJson.exports) {
                errors.push(\`\${pkgDir}: Missing \\"exports\\" field\`);
              } else {
                const checkExportValue = (val, keyPath) => {
                  if (typeof val === 'string') {
                    const exportFilePath = path.join(rootDir, pkgDir, val);
                    if (!fs.existsSync(exportFilePath)) {
                      errors.push(\`\${pkgDir}: Export \\"\${keyPath}\\" points to \\"\${val}\\" which does not exist\`);
                    }
                  } else if (typeof val === 'object' && val !== null) {
                    Object.keys(val).forEach(k => {
                      checkExportValue(val[k], \`\${keyPath} -> \${k}\`);
                    });
                  }
                };
                checkExportValue(pkgJson.exports, 'exports');
              }
            }
          });
          if (errors.length > 0) {
            console.error('Validation failed with following errors:');
            errors.forEach(err => console.error(\`- \${err}\`));
            process.exit(1);
          } else {
            console.log('All manifests and exports are valid!');
          }
          "

  typescript:
    name: TypeScript build + tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        module: [sdk, coordinator, resolver, relayer, frontend, contracts, e2e]
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile=false

      - name: Build
        run: pnpm --filter @wafflefinance/${{ matrix.module }} run build --if-present

      - name: Compile
        run: pnpm --filter @wafflefinance/${{ matrix.module }} run compile --if-present

      - name: Typecheck
        run: pnpm --filter @wafflefinance/${{ matrix.module }} exec tsc --noEmit || echo "tsc not applicable or warning ignored"

      - name: Test
        run: pnpm --filter @wafflefinance/${{ matrix.module }} run test --if-present

  soroban:
    name: Soroban contracts
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: soroban
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown,wasm32v1-none

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            soroban/target
          key: soroban-${{ runner.os }}-${{ hashFiles('soroban/Cargo.toml', 'soroban/contracts/**/Cargo.toml') }}

      - name: Build contracts
        run: cargo build
